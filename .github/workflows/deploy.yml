name: Deploy To Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.13'

jobs:
  verify-objective-tests:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read

    steps:
      - name: Wait for objective workflows on this commit
        uses: actions/github-script@v7
        with:
          script: |
            const requiredWorkflows = [
              'Objective 1.1 - Learning Interface',
              'Objective 1.2 - Adaptive Learning',
              'Objective 2.1 - Model Fabrication and Testing',
              'Objective 2.2 - Data Handling',
              'Objective 3.1 - Secure Code Execution',
              'Objective 3.2 - Deployment and Persistence',
            ];

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.sha;

            const timeoutMs = 20 * 60 * 1000;
            const pollMs = 15 * 1000;
            const deadline = Date.now() + timeoutMs;

            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            function latestRunByName(runs, name) {
              const candidates = runs.filter((run) => run.name === name);
              if (!candidates.length) {
                return null;
              }

              candidates.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
              return candidates[0];
            }

            while (Date.now() < deadline) {
              const runs = await github.paginate(
                github.rest.actions.listWorkflowRunsForRepo,
                {
                  owner,
                  repo,
                  head_sha: sha,
                  per_page: 100,
                }
              );

              const summary = requiredWorkflows.map((name) => {
                const run = latestRunByName(runs, name);
                return {
                  name,
                  exists: Boolean(run),
                  status: run?.status ?? 'missing',
                  conclusion: run?.conclusion ?? 'missing',
                  url: run?.html_url ?? '',
                };
              });

              const missing = summary.filter((item) => !item.exists);
              const pending = summary.filter((item) => item.exists && item.status !== 'completed');

              if (!missing.length && !pending.length) {
                const failed = summary.filter((item) => item.conclusion !== 'success');

                if (failed.length) {
                  core.setFailed(
                    `Objective workflow gate failed for ${sha}.\n` +
                    failed.map((item) => `- ${item.name}: ${item.conclusion} (${item.url || 'no-url'})`).join('\n')
                  );
                  return;
                }

                core.info(`All required objective workflows passed for commit ${sha}.`);
                return;
              }

              core.info(
                `Waiting for objective workflows on ${sha}. ` +
                `Missing: ${missing.map((item) => item.name).join(', ') || 'none'}; ` +
                `Pending: ${pending.map((item) => item.name).join(', ') || 'none'}.`
              );

              await sleep(pollMs);
            }

            core.setFailed(
              `Timed out waiting for all objective workflows to complete on commit ${sha}. ` +
              `Check the Actions tab for workflow status.`
            );

  build-image:
    runs-on: ubuntu-latest
    needs: verify-objective-tests
    permissions:
      contents: read
      id-token: write
    outputs:
      image: ${{ steps.image.outputs.primary }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check Google Cloud configuration
        shell: bash
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION }}
          GCP_ARTIFACT_REGISTRY_REPOSITORY: ${{ vars.GCP_ARTIFACT_REGISTRY_REPOSITORY }}
          GCP_CLOUD_RUN_SERVICE: ${{ vars.GCP_CLOUD_RUN_SERVICE }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
        run: |
          missing=0
          for name in GCP_PROJECT_ID GCP_REGION GCP_ARTIFACT_REGISTRY_REPOSITORY GCP_CLOUD_RUN_SERVICE GCP_WORKLOAD_IDENTITY_PROVIDER GCP_SERVICE_ACCOUNT; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required GitHub configuration: ${name}"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token
          access_token_lifetime: 3600s

      - name: Log in to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.GCP_REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image references
        id: image
        shell: bash
        run: |
          registry="${{ vars.GCP_REGION }}-docker.pkg.dev"
          project="${{ vars.GCP_PROJECT_ID }}"
          repository="${{ vars.GCP_ARTIFACT_REGISTRY_REPOSITORY }}"
          service="${{ vars.GCP_CLOUD_RUN_SERVICE }}"
          echo "primary=${registry}/${project}/${repository}/${service}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest=${registry}/${project}/${repository}/${service}:latest" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.primary }}
            ${{ steps.image.outputs.latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-cloud-run:
    runs-on: ubuntu-latest
    needs: build-image
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check Google Cloud configuration
        shell: bash
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION }}
          GCP_CLOUD_RUN_SERVICE: ${{ vars.GCP_CLOUD_RUN_SERVICE }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
        run: |
          missing=0
          for name in GCP_PROJECT_ID GCP_REGION GCP_CLOUD_RUN_SERVICE GCP_WORKLOAD_IDENTITY_PROVIDER GCP_SERVICE_ACCOUNT; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required GitHub configuration: ${name}"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Build Cloud Run flags
        id: deploy-flags
        shell: bash
        env:
          GCP_CLOUD_SQL_INSTANCE: ${{ vars.GCP_CLOUD_SQL_INSTANCE }}
          APP_DATABASE_URL_SECRET: ${{ vars.APP_DATABASE_URL_SECRET }}
        run: |
          flags="--allow-unauthenticated --port=8080"

          if [ -n "${GCP_CLOUD_SQL_INSTANCE}" ]; then
            flags="${flags} --add-cloudsql-instances=${GCP_CLOUD_SQL_INSTANCE}"
            flags="${flags} --set-env-vars=CLOUD_SQL_CONNECTION_NAME=${GCP_CLOUD_SQL_INSTANCE}"
          fi

          if [ -n "${APP_DATABASE_URL_SECRET}" ]; then
            flags="${flags} --set-secrets=DATABASE_URL=${APP_DATABASE_URL_SECRET}:latest"
          fi

          echo "value=${flags}" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          service: ${{ vars.GCP_CLOUD_RUN_SERVICE }}
          region: ${{ vars.GCP_REGION }}
          image: ${{ needs.build-image.outputs.image }}
          flags: ${{ steps.deploy-flags.outputs.value }}

      - name: Show Cloud Run URL
        run: |
          echo "Cloud Run service URL: ${{ steps.deploy.outputs.url }}"